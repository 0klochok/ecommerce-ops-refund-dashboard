name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    name: Local validation gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ecommerce_ops_refund_dashboard
          POSTGRES_PASSWORD: app_local_password
          POSTGRES_USER: app_local
        options: >-
          --health-cmd "pg_isready -U app_local -d ecommerce_ops_refund_dashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://app_local:app_local_password@localhost:5432/ecommerce_ops_refund_dashboard?schema=public
      MOCK_EXTERNAL_APIS: "true"
      STRIPE_MODE: mock
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: whsec_mock_test_secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed demo data
        run: pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm e2e -- --project=chromium

