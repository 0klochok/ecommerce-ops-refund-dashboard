services:
  db:
    image: postgres:17-alpine
    container_name: ecommerce_ops_refund_dashboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_ops_refund_dashboard
      POSTGRES_USER: app_local
      POSTGRES_PASSWORD: app_local_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_local -d ecommerce_ops_refund_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
